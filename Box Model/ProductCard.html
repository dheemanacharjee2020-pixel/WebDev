<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
             background-color: blanchedalmond;
             font-family: cursive;
             display: flex;
             /* Side by Side - row format */
             justify-content: center;
             align-items: center;
        }

        .product{
            background-color: white;
            border: 1px solid brown;
            margin: 30px;
            padding: 25px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 6px 5px 12px black;
        }
        
        .product img{
            object-fit: cover;
            width: 100%;
            height: 100px;
            border-radius: 12px;
        }

        .product button{
            background-color: orange;
            border: none;
            padding: 15px;
            border-radius: 12px;
            color: white;
            cursor :pointer;
        }
        
        button:hover{
            background-color: darkgoldenrod;
            transform: scale(1.02);
            transition: 2s;
        }
    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.pexels.com/photos/47261/pexels-photo-47261.jpeg" >
        <h2>Mobile</h2>
        <p>150$</p>
        <button>Add To Cart</button>
    </div>

     <div class="product">
        <img src="https://images.pexels.com/photos/8003992/pexels-photo-8003992.jpeg" height="100" width="100">
        <h2>Laptop</h2>
        <p>1000$</p>
        <button>Add To Cart</button>
    </div >

     <div class="product">
        <img src="https://images.pexels.com/photos/27256452/pexels-photo-27256452.jpeg" height="100" width="100">
        <h2>Shoes</h2>
        <p>500$</p>
        <button>Add To Cart</button>
    </div>
</body>
</html>
