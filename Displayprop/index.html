<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color: red;
            
            font-family: cursive;
        }

        p .ex1{
           display: none; 
        }

        p .ex2{
            display: block;
            background-color: blueviolet;
        }

        p .ex3{
            display: inline;
            background-color: white;
        }

    </style>
</head>
<body>
    <h1>Dispaly Properties</h1>

    <h1>Display : none</h1>
    <div>
        Here The function Disable as none
        <p class="ex1">Hello Display None</p>
    </div>

    

    <h1>Display : Block</h1>
    <div>
        Similar to div container
        <p class="ex2">Hello Display Block<strong>Hello Guys</strong></p>
    </div>

    <h1>Display : Inline</h1>
    <div>
        Similar Span tag
        <p class="ex3">Hello Display Inline</p>
    </div>
</body>
</html>
