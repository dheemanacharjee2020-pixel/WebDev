<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: monospace;
            background-color: aliceblue;
            margin: 0px;
        }
        h1{
            text-align: center;
            color: black;
            margin-bottom: 30px;
        }

        .team {

        .card{

            background-color: lightskyblue;
            width:100px;
            text-align: center;
            padding: 20px;
            box-shadow: 2px 4px 12px blue;
        }

        .card img{
            border-radius: 50% solid black;
            color: aliceblue;
        }

        .card button{
            padding: 20px;
            border: none;
            background-color: blue;
            border-radius: 12px;
        }
    </style>
</head>

</html>
