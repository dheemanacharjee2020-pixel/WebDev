    <h1>data types in javascript 2</h1>

    <script>
        //Array - It is used to store multiple values at the same time
        //Advantage in Js Array - Can store different types of data together
        //Symbol - [ ] Square Bracket
        //Rule : Index no starts with 0

        let students=["Abhinav" , "Vaisnavi" , "Piyush" , "Rohini" , "Ayushi"]
        
        console.log(students)

        //acess a single data from array - Arrayname[Index No]
        console.log(students[4])
    </script>
