<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Div - It is Block level / 100% width of the space -->
    <div style="background-color: lightblue;">
        <h2>Menu</h2>
        <ol>

            <li>pizza</li>
            <li>coffee</li>
        </ol>
    </div>



    <!-- Span Tag - Takes only required amount of width / Inline Tag -->
     <!-- Span tag can be added inside any other html tag -->
      <span style="background-color: brown;">Login</span>
      <button><span>Cart 0</span></button>



</body>
</html>
