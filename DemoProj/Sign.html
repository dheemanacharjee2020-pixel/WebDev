<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Inglide</title>
    <style>
        body{
            background-image: url(https://images.pexels.com/photos/982612/pexels-photo-982612.jpeg);
            background-size: cover;
            
        }
        .intro{
            text-align: start;
            text-shadow: 0px 4px 8px purple;
            color: darkmagenta;
        }

        .labe{
            padding: 20px;
            border: none;
            display: flex;
            justify-content: start;
            gap:30px;
            font-size: larger;
        }

        .labe label{
             font-family: cursive;
             color: aliceblue;
             text-align: center;
             font-size: medium;
             
             
        }

        .labe input{
            
            border: 1px solid black;
            border-radius: 4px;
            color: blue;
            height: 15px;
            width: 50%;
            

        }

        .b{
            display: flex;
            justify-content: center;
        }
          
        button{
            border: none;
            padding: 18px;
            font-weight: bold;
            background-color: orange;
            border-radius: 12px;
            
            cursor: pointer;
            
        }
        
        button:hover{
                   transform: scale(1.02);
                   transition: 2s;
        }

        
    </style>
</head>
<body>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    
    <br>
    <div class="intro">
         <h1>Welcome To Cafe Inglide</h1>
    
    
    </div>
    <div class="labe">
    <label>Email :</label>
    <input type="email" placeholder="Enter Your Email"><br><br>
    </div>
     
    <div class="labe">
    <label>Phone Number :</label>
    <input type="number" placeholder="Ener Your Phone Number"><br><br>
    </div>

    <div class="labe">
    <label>Password :</label>
    <input type="password" placeholder="Enter Your Password"><br><br>
    </div>
    <br>

   <div class="b"><button><a href="home.html">Sign in</a></button></div>
</body>
</html>
