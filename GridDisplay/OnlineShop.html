<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            font-family: cursive;
            background-color: aliceblue;
            margin:0;

        }

        .parent{
            display: grid;
            grid-template-columns: repeat(auto-fit , minmax(250px, 1fr));
            /* 250 - standard minimum size of column */
            gap:30px;
            padding: 10px;
            flex-wrap: wrap;
        }

        .product{
            border: 1px solid black;
            overflow: hidden;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0px 2px 6px blue;
            padding-bottom: 10px;
            font-style: italic;
            color: rgb(0, 81, 255);
        }

        .product img{
            width:100%;
            height: 200px;
            object-fit: cover;
            
            border-radius: 12px;
        }

        .product button{
            background-color: yellow;
            padding: 10px;
            font-family: fantasy;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        .product:hover{
                   transform: scale(1.02);
                   transition: 2s;
        }
    </style>
</head>
<body>
  <div class="parent"> 
    <div class="product">
        <img src="">
        <h2>Headphones</h2>
        <p><del>180$</del><mark>100$</mark></p>
        <button></button>
        </div>

</html>
