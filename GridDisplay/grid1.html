<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .store{
            display: grid;
            grid-template-columns: repeat(3 , 1fr);
        /*                           repeat(No of columns , size of each column) */
            gap: 25px; 
            background-color: aqua;
    }


.products{
    background-color: blueviolet;
    border: 1px solid black;
    padding: 20px;
    text-align: center;
    font-weight: bolder;
}
    </style>
</head>
<body>
    <div class="store">
        <div class="products">Product 1</div>
        <div class="products">Product 2</div>
        <div class="products">Product 3</div>
        <div class="products">Product 4</div>
        <div class="products">Product 5</div>
        <div class="products">Product 6</div>
    </div>
</body>
</html>
