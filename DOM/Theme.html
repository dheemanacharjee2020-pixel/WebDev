<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="bnt" onclick="theme()">🌙</button>

    <script>
         const button = document.getElementById('bnt')
         function lighttheme(){
            button.innerHTML = '☀️'
            document.body.style.backgroundColor = 'black'
         }

          function darktheme(){
            button.innerHTML = '🌙'
            document.body.style.backgroundColor = 'white'
         }


        function theme(){
            
                if(button.innerHTML === '🌙'){
             lighttheme()
         }else{
            darktheme()
         }
             
        }


         
    </script>
</body>
</html>
