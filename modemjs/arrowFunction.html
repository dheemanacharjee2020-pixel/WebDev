    <script>
        function add(x,y){

        }
        add(5,3)


        //Arrow function - One Single Line Of Logic
        // ()=>   

        var xyz = (a,b)=> {
            console.log(a + b)
            console.log("Hello")
        }

        xyz(1,1)
    </script>
